<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Brimstone FPS Arena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff4655; font-size: 28px; font-weight: bold; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 24px; pointer-events: none; z-index: 10; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.7); padding: 20px; text-align: center; border: 2px solid #ff4655; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">SKOR: <span id="score">0</span></div>
    <div id="crosshair">+</div>
    <div id="instructions"><h1>OYUNA BAŞLA</h1><p>WASD: Hareket | Mouse: Bakış | Tıkla: Ateş Et</p></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101010);
        scene.fog = new THREE.Fog(0x101010, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { instructions.style.display = 'none'; });
        controls.addEventListener('unlock', () => { instructions.style.display = 'block'; });

        // --- IŞIKLANDIRMA ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // --- YER (ZEMİN) ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- DEĞİŞKENLER ---
        let score = 0;
        const enemies = [];
        const bullets = [];
        const move = { f: false, b: false, l: false, r: false };
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // --- KONTROLLER ---
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.f = true;
            if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true;
            if(e.code === 'KeyD') move.r = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.f = false;
            if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false;
            if(e.code === 'KeyD') move.r = false;
        });

        // --- ATEŞ ETME ---
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) return;
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.05),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            bullet.position.copy(camera.position);
            const vector = new THREE.Vector3(0, 0, -1);
            vector.applyQuaternion(camera.quaternion);
            bullet.userData.velocity = vector.multiplyScalar(1.0);
            scene.add(bullet);
            bullets.push(bullet);
        });

        // --- DÜŞMAN (KUTU) SPAWN ---
        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff4655, emissive: 0x330000 })
            );
            const x = (Math.random() - 0.5) * 40;
            const z = (Math.random() - 0.5) * 40;
            enemy.position.set(x, 1, z);
            scene.add(enemy);
            enemies.push(enemy);
        }
        for(let i=0; i<15; i++) spawnEnemy();

        // --- ANA DÖNGÜ ---
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(move.f) - Number(move.b);
                direction.x = Number(move.r) - Number(move.l);
                direction.normalize();

                if (move.f || move.b) velocity.z -= direction.z * 100.0 * delta;
                if (move.l || move.r) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }

            // Mermileri ilerlet ve vurulma kontrolü
            bullets.forEach((b, bi) => {
                b.position.add(b.userData.velocity);
                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 1.2) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                        spawnEnemy(); // Yeni düşman gelsin
                    }
                });
                if(b.position.length() > 100) { scene.remove(b); bullets.splice(bi, 1); }
            });

            renderer.render(scene, camera);
            prevTime = time;
        }
        animate();
    </script>
</body>
</html>
