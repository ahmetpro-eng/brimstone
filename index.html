<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brimstone Akıllı Tahta Arena</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1b2838 0%, #050505 100%); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff4655; font-size: 28px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 2px solid #ff4655; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">SKOR: <span id="score">0</span></div>
    <div id="loading">Brimstone ve Düşmanlar Yükleniyor...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1 : 1);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        let score = 0;
        const enemies = [];
        const bullets = [];

        // --- DOSYA İSMİ GÜNCELLENDİ ---
        const modelName = 'Meshy_AI_Brimstone_Alternativ_0325083301_texture.glb';

        const loader = new GLTFLoader();
        loader.load(modelName, (gltf) => {
            const model = gltf.scene;
            model.scale.set(1.5, 1.5, 1.5);
            model.position.set(0, -1, 0);
            scene.add(model);
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            document.getElementById('loading').innerText = "Hata: Dosya ismi uyuşmuyor!";
            console.error(error);
        });

        camera.position.set(0, 1.5, 5);

        window.addEventListener('pointerdown', () => {
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            bullet.position.set(0, 1, 0);
            bullet.userData.velocity = new THREE.Vector3(0, 0, -1).multiplyScalar(0.5);
            scene.add(bullet);
            bullets.push(bullet);
        });

        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1.5, 0.8),
                new THREE.MeshStandardMaterial({ color: 0xff4655, emissive: 0xff0000 })
            );
            enemy.position.set((Math.random() - 0.5) * 15, 0, -25);
            scene.add(enemy);
            enemies.push(enemy);
        }
        setInterval(spawnEnemy, 1500);

        function animate() {
            requestAnimationFrame(animate);

            bullets.forEach((bullet, bIndex) => {
                bullet.position.add(bullet.userData.velocity);
                if (bullet.position.z < -30) {
                    scene.remove(bullet);
                    bullets.splice(bIndex, 1);
                }
            });

            enemies.forEach((enemy, eIndex) => {
                enemy.position.z += 0.08;
                bullets.forEach((bullet, bIndex) => {
                    if (enemy.position.distanceTo(bullet.position) < 0.8) {
                        scene.remove(enemy);
                        enemies.splice(eIndex, 1);
                        scene.remove(bullet);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                    }
                });
                if (enemy.position.z > 5) {
                    scene.remove(enemy);
                    enemies.splice(eIndex, 1);
                    score = Math.max(0, score - 5);
                    document.getElementById('score').innerText = score;
                }
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
