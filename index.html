<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Brimstone Hunter FPS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff4655; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 10; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 30px; pointer-events: none; z-index: 10; }
        .joystick { position: absolute; bottom: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; z-index: 5; }
        #move-joy { left: 50px; } 
        #look-joy { right: 50px; }
    </style>
</head>
<body>
    <div id="ui">SKOR: <span id="score">0</span></div>
    <div id="crosshair">+</div>
    <div id="move-joy" class="joystick"></div>
    <div id="look-joy" class="joystick"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 15, 5);
        scene.add(sun);

        // Zemin (Grid)
        const grid = new THREE.GridHelper(200, 100, 0xff4655, 0x222222);
        scene.add(grid);

        let score = 0;
        const enemies = [];
        const bullets = [];
        let brimstoneMasterModel = null;

        const loader = new GLTFLoader();
        const modelUrl = 'Meshy_AI_Brimstone_Alternativ_0325083301_texture.glb';

        loader.load(modelUrl, (gltf) => {
            brimstoneMasterModel = gltf.scene;
            brimstoneMasterModel.scale.set(1.5, 1.5, 1.5);
            for(let i=0; i<8; i++) spawnEnemy();
        });

        function spawnEnemy() {
            if(!brimstoneMasterModel) return;
            const enemy = brimstoneMasterModel.clone();
            // Rastgele uzaklıkta başlat
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 20;
            enemy.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
            scene.add(enemy);
            enemies.push(enemy);
        }

        let moveData = { x: 0, y: 0 };
        let rotationY = 0;
        let rotationX = 0;

        document.getElementById('move-joy').addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = e.target.getBoundingClientRect();
            moveData.x = (touch.clientX - (rect.left + 50)) / 50;
            moveData.y = (touch.clientY - (rect.top + 50)) / 50;
        });
        document.getElementById('move-joy').addEventListener('touchend', () => moveData = { x: 0, y: 0 });

        document.getElementById('look-joy').addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        });
        document.getElementById('look-joy').addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = e.target.getBoundingClientRect();
            rotationY -= (touch.clientX - (rect.left + 50)) * 0.0015;
            rotationX -= (touch.clientY - (rect.top + 50)) * 0.0015;
        });

        function shoot() {
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = dir.multiplyScalar(1.2);
            scene.add(bullet);
            bullets.push(bullet);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Oyuncu Hareketi
            const moveDir = new THREE.Vector3(moveData.x, 0, moveData.y).applyQuaternion(camera.quaternion);
            camera.position.x += moveDir.x * -0.15;
            camera.position.z += moveDir.z * -0.15;
            camera.position.y = 1.8; // Yerden yükseklik

            // Bakış Ayarı
            camera.rotation.order = 'YXZ';
            camera.rotation.y = rotationY;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, rotationX));

            // Düşman Yapay Zekası (Sana doğru yürüme)
            enemies.forEach((enemy) => {
                const directionToPlayer = new THREE.Vector3().subVectors(camera.position, enemy.position);
                directionToPlayer.y = 0; // Uçmasınlar, sadece yerde yürüsünler
                directionToPlayer.normalize();
                
                // Yavaşça sana yaklaşsınlar
                enemy.position.add(directionToPlayer.multiplyScalar(0.04));
                
                // Sana doğru baksınlar
                enemy.lookAt(camera.position.x, 0, camera.position.z);
            });

            // Mermiler ve Çarpışma
            bullets.forEach((b, bi) => {
                b.position.add(b.userData.velocity);
                enemies.forEach((e, ei) => {
                    // Düşman gövdesine (y=1 civarı) çarpma kontrolü
                    const hitBox = e.position.clone().add(new THREE.Vector3(0, 1.2, 0));
                    if(b.position.distanceTo(hitBox) < 1.2) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score += 10;
                        document.getElementById('score').innerText = score;
                        spawnEnemy(); // Ölenin yerine yeni biri gelsin
                    }
                });
                if(b.position.length() > 100) { scene.remove(b); bullets.splice(bi, 1); }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
