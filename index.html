<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Brimstone Hunter FPS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff4655; font-size: 24px; font-weight: bold; z-index: 10; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff00; font-size: 30px; pointer-events: none; z-index: 10; }
        .joystick { position: absolute; bottom: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #fff; z-index: 5; }
        #move-joy { left: 40px; } 
        #look-joy { right: 40px; }
    </style>
</head>
<body>
    <div id="ui">SKOR: <span id="score">0</span></div>
    <div id="crosshair">+</div>
    <div id="move-joy" class="joystick"></div>
    <div id="look-joy" class="joystick"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SAHNE VE KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 15, 5);
        scene.add(sun);

        scene.add(new THREE.GridHelper(200, 100, 0xff4655, 0x222222));

        let score = 0;
        const enemies = [];
        const bullets = [];
        let masterModel = null;

        // --- MODEL YÜKLEME ---
        const loader = new GLTFLoader();
        // Dosya ismin aynen duruyor
        const modelUrl = 'Meshy_AI_Brimstone_Alternativ_0325083301_texture.glb';

        loader.load(modelUrl, (gltf) => {
            masterModel = gltf.scene;
            for(let i=0; i<8; i++) spawnEnemy();
        });

        function spawnEnemy() {
            if(!masterModel) return;
            const enemy = masterModel.clone();
            
            // Rastgele zıplama ritmi (hepsi aynı anda zıplamasın)
            enemy.userData.bobOffset = Math.random() * Math.PI * 2;

            // --- TERS MODEL DÜZELTMESİ (KRİTİK!) ---
            // Modeli X ekseninde 180 derece döndürerek ayaklarının üzerine bastırıyoruz.
            enemy.rotation.x = Math.PI; 
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 20;
            enemy.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
            enemy.scale.set(1.5, 1.5, 1.5);
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        // --- DOKUNMATİK KONTROLLER ---
        let moveData = { x: 0, y: 0 }, rotY = 0, rotX = 0;

        document.getElementById('move-joy').addEventListener('touchmove', (e) => {
            const r = e.target.getBoundingClientRect();
            moveData.x = (e.touches[0].clientX - (r.left + 50)) / 50;
            moveData.y = (e.touches[0].clientY - (r.top + 50)) / 50;
        });
        document.getElementById('move-joy').addEventListener('touchend', () => moveData = { x: 0, y: 0 });

        document.getElementById('look-joy').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });
        document.getElementById('look-joy').addEventListener('touchmove', (e) => {
            const r = e.target.getBoundingClientRect();
            rotY -= (e.touches[0].clientX - (r.left + 50)) * 0.002;
            rotX -= (e.touches[0].clientY - (r.top + 50)) * 0.002;
        });

        function shoot() {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position).y -= 0.2;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.userData.vel = dir.multiplyScalar(1.5);
            scene.add(b);
            bullets.push(b);
        }

        // --- ANA DÖNGÜ ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Oyuncu Hareketi
            const playerSpeed = 0.2;
            const mDir = new THREE.Vector3(moveData.x, 0, moveData.y).applyQuaternion(camera.quaternion);
            camera.position.x += mDir.x * -playerSpeed;
            camera.position.z += mDir.z * -playerSpeed;
            camera.position.y = 1.8; // Göz hizası

            camera.rotation.order = 'YXZ';
            camera.rotation.y = rotY;
            camera.rotation.x = Math.max(-1.4, Math.min(1.4, rotX));

            // Düşman Takibi ve YAPAY KOŞMA (T-Pose Düzeltmesi)
            enemies.forEach((enemy) => {
                const toP = new THREE.Vector3().subVectors(camera.position, enemy.position);
                toP.y = 0;
                toP.normalize();

                const enemyRunSpeed = 0.12; // Depar hızı
                enemy.position.x += toP.x * enemyRunSpeed;
                enemy.position.z += toP.z * enemyRunSpeed;
                
                // --- BAKIŞ DÜZELTMESİ (KRİTİK!) ---
                // Model X ekseninde döndüğü için, lookAt() fonksiyonunu 
                // X eksenine göre düzeltmemiz gerekiyor.
                const targetPoint = new THREE.Vector3(camera.position.x, 0, camera.position.z);
                enemy.lookAt(targetPoint);
                enemy.rotateX(Math.PI); // Modelin 'ters' bakmasını engellemek için tekrar döndür

                // --- YAPAY KOŞMA EFEKTİ (Minecraft Zombisi Modu) ---
                // Hızlı bir şekilde aşağı yukarı sekerler (Zıplama)
                enemy.position.y = Math.abs(Math.sin(time * 15 + enemy.userData.bobOffset)) * 0.5;
                // Koşarken omuzları sağa sola yatsın (Sallanma)
                enemy.rotation.z = Math.sin(time * 7.5 + enemy.userData.bobOffset) * 0.15;
            });

            // Mermi ve Vurulma
            bullets.forEach((b, bi) => {
                b.position.add(b.userData.vel);
                enemies.forEach((e, ei) => {
                    // Düşman gövdesine (y=1 civarı) çarpma kontrolü
                    const hitBox = e.position.clone().add(new THREE.Vector3(0, 1.2, 0));
                    if(b.position.distanceTo(hitBox) < 1.3) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score += 10; document.getElementById('score').innerText = score;
                        spawnEnemy();
                    }
                });
                if(b.position.length() > 100) { scene.remove(b); bullets.splice(bi, 1); }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
